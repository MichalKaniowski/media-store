<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media Shop</title>

    <script
      src="https://kit.fontawesome.com/9ca2fe81e6.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <strong class="navbar-brand"> <span>Media</span> Amator</strong>
      <div class="logo-container">
        <i class="fa-solid fa-play logo"></i>
      </div>

      <input type="text" class="filter" placeholder="Search in shop" />
      <button class="magnifier-button">
        <img src="images/magnifier.svg" alt="" />
      </button>

      <div class="bucket-container">
        <img
          src="images/shopping_cart.svg"
          class="bucket-icon"
          alt="shopping bucket"
        />

        <span>Koszyk</span>
      </div>
    </nav>

    <main>
      <aside class="navigation">
        <div>
          <p class="navigation-heading">Produkty</p>
        </div>
        <div class="category active">Wszystkie</div>
        <div class="category">Iphone</div>
        <div class="category">Huawei</div>
        <div class="category">Nokia</div>
        <div class="category">Samsung</div>
      </aside>

      <ul class="products-list"></ul>
    </main>

    <script type="module" src="products.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
