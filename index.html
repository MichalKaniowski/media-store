<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media Store</title>

    <script
      src="https://kit.fontawesome.com/9ca2fe81e6.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <a href="/">
        <strong class="navbar-brand"> <span>Media</span> Store</strong>
      </a>
      <div class="logo-container">
        <i class="fa-solid fa-play logo"></i>
      </div>

      <input type="text" class="filter" placeholder="Search in shop" />
      <button class="magnifier-button">
        <img src="images/magnifier.svg" alt="" />
      </button>

      <div class="bucket-container">
        <img
          src="images/shopping_cart.svg"
          class="bucket-icon"
          alt="shopping bucket"
        />

        <span>Koszyk</span>
        <button class="empty-the-basket-button">x</button>
      </div>
    </nav>

    <div class="input-div">
      <input type="text" class="filter" placeholder="Search in shop" />
    </div>

    <main>
      <aside class="navigation">
        <div class="categories">
          <div>
            <p class="navigation-heading">Produkty</p>
          </div>
        </div>
      </aside>

      <ul class="products-list"></ul>
    </main>

    <div class="empty-state-container">
      <h2 class="empty-state-heading">No products were found</h2>
    </div>

    <script type="module" src="utils.js"></script>
    <script type="module" src="products.js"></script>
    <script type="module" src="main.js"></script>
  </body>
</html>
